<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 150" width="900" height="150">
<foreignObject width="900" height="150">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
:root{--bg0:#0a0a0f;--bg1:#12121f;--t:#fff;--ts:#94a3b8}
@media(prefers-color-scheme:light){:root{--bg0:#fafafa;--bg1:#f0ebff;--t:#1a1a2e;--ts:#64748b}}
*{margin:0;padding:0;box-sizing:border-box}
.w{width:900px;height:150px;background:linear-gradient(150deg,var(--bg0),var(--bg1));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;border-radius:16px;overflow:hidden;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:var(--t);position:relative}
.glow{position:absolute;width:500px;height:120px;top:0;left:50%;transform:translateX(-50%);background:radial-gradient(ellipse at 50% 0%,rgba(168,85,247,.15) 0%,transparent 70%);pointer-events:none}
.quote{font-size:16px;font-weight:700;color:var(--t);text-align:center;letter-spacing:.01em}
.accent{background:linear-gradient(90deg,#6366f1,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.links{display:flex;gap:24px;align-items:center}
.link{font-size:13px;color:var(--ts);text-decoration:none;font-weight:600;padding:4px 0;border-bottom:1px solid transparent}
.sep{font-size:13px;color:rgba(168,85,247,.3)}
.mit{font-size:11.5px;color:rgba(148,163,184,.5);margin-top:2px}
</style>
<div class="w">
  <div class="glow"></div>
  <div class="quote">Built for developers who want to <span class="accent">ship fast without cutting corners</span>.</div>
  <div class="links">
    <span class="link">GitHub</span>
    <span class="sep">·</span>
    <span class="link">Issues</span>
    <span class="sep">·</span>
    <span class="link">Stars</span>
    <span class="sep">·</span>
    <span class="link">MIT License</span>
  </div>
  <div class="mit">© 2025 AuraKit Contributors</div>
</div>
</div>
</foreignObject>
</svg>
