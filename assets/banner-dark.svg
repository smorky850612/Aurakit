<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="pGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    @keyframes sparkleA {
      0%, 100% { opacity: 0.12; }
      50%      { opacity: 0.95; }
    }
    @keyframes sparkleB {
      0%, 100% { opacity: 0.20; }
      50%      { opacity: 0.80; }
    }
    .tg {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: fadeInUp 1s cubic-bezier(0.22,1,0.36,1) 0.2s both;
    }
    .sg {
      transform-box: fill-box;
      transform-origin: 50% 50%;
      animation: fadeInUp 1s cubic-bezier(0.22,1,0.36,1) 0.55s both;
    }
  </style>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bgGrad)"/>
  <!-- Ambient center glow -->
  <rect width="900" height="300" fill="url(#centerGlow)"/>

  <!-- Particles — top row -->
  <circle cx="45"  cy="22"  r="1.5" fill="#a855f7" filter="url(#pGlow)" style="animation:sparkleA 2.5s ease-in-out 0.0s infinite;"/>
  <circle cx="120" cy="38"  r="2.0" fill="#c084fc" filter="url(#pGlow)" style="animation:sparkleB 3.0s ease-in-out 0.4s infinite;"/>
  <circle cx="230" cy="18"  r="1.5" fill="#a855f7" filter="url(#pGlow)" style="animation:sparkleA 3.5s ease-in-out 0.8s infinite;"/>
  <circle cx="378" cy="32"  r="2.5" fill="#c084fc" filter="url(#pGlow)" style="animation:sparkleB 2.0s ease-in-out 1.2s infinite;"/>
  <circle cx="522" cy="15"  r="1.5" fill="#a855f7" filter="url(#pGlow)" style="animation:sparkleA 4.0s ease-in-out 0.2s infinite;"/>
  <circle cx="670" cy="28"  r="2.0" fill="#a855f7" filter="url(#pGlow)" style="animation:sparkleB 2.5s ease-in-out 0.6s infinite;"/>
  <circle cx="780" cy="42"  r="1.5" fill="#c084fc" filter="url(#pGlow)" style="animation:sparkleA 3.0s ease-in-out 1.0s infinite;"/>
  <circle cx="868" cy="20"  r="2.0" fill="#a855f7" filter="url(#pGlow)" style="animation:sparkleB 3.5s ease-in-out 1.4s infinite;"/>

  <!-- Particles — bottom row -->
  <circle cx="30"  cy="268" r="2.0" fill="#a855f7" filter="url(#pGlow)" style="animation:sparkleA 3.5s ease-in-out 0.7s infinite;"/>
  <circle cx="112" cy="282" r="1.5" fill="#c084fc" filter="url(#pGlow)" style="animation:sparkleB 2.5s ease-in-out 0.3s infinite;"/>
  <circle cx="210" cy="275" r="2.5" fill="#a855f7" filter="url(#pGlow)" style="animation:sparkleA 3.0s ease-in-out 1.1s infinite;"/>
  <circle cx="360" cy="288" r="1.5" fill="#c084fc" filter="url(#pGlow)" style="animation:sparkleB 2.0s ease-in-out 0.5s infinite;"/>
  <circle cx="500" cy="272" r="2.0" fill="#a855f7" filter="url(#pGlow)" style="animation:sparkleA 4.0s ease-in-out 0.9s infinite;"/>
  <circle cx="658" cy="284" r="1.5" fill="#c084fc" filter="url(#pGlow)" style="animation:sparkleB 2.5s ease-in-out 1.3s infinite;"/>
  <circle cx="790" cy="270" r="2.0" fill="#a855f7" filter="url(#pGlow)" style="animation:sparkleA 3.0s ease-in-out 0.1s infinite;"/>
  <circle cx="864" cy="258" r="2.5" fill="#c084fc" filter="url(#pGlow)" style="animation:sparkleB 3.5s ease-in-out 1.6s infinite;"/>

  <!-- Particles — left / right sides -->
  <circle cx="22"  cy="110" r="1.5" fill="#a855f7" filter="url(#pGlow)" style="animation:sparkleA 2.5s ease-in-out 0.8s infinite;"/>
  <circle cx="42"  cy="188" r="2.0" fill="#c084fc" filter="url(#pGlow)" style="animation:sparkleB 3.5s ease-in-out 1.5s infinite;"/>
  <circle cx="878" cy="118" r="2.0" fill="#a855f7" filter="url(#pGlow)" style="animation:sparkleA 3.0s ease-in-out 0.4s infinite;"/>
  <circle cx="858" cy="185" r="1.5" fill="#c084fc" filter="url(#pGlow)" style="animation:sparkleB 2.0s ease-in-out 1.0s infinite;"/>

  <!-- Main title -->
  <g class="tg">
    <text x="450" y="148"
          text-anchor="middle"
          dominant-baseline="middle"
          font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
          font-size="80"
          font-weight="900"
          letter-spacing="-2"
          fill="#ffffff">AuraKit</text>
  </g>

  <!-- Subtitle -->
  <g class="sg">
    <text x="450" y="196"
          text-anchor="middle"
          dominant-baseline="middle"
          font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
          font-size="19"
          font-weight="400"
          letter-spacing="0.4"
          fill="#a855f7">One command. Full stack. Zero compromise.</text>
  </g>

  <!-- Bottom gradient line -->
  <rect x="0" y="295" width="900" height="5" fill="url(#lineGrad)"/>
</svg>
