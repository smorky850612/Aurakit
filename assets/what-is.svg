<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
<foreignObject width="900" height="300">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
:root{--bg0:#0a0a0f;--bg1:#12121f;--t:#fff;--ts:#94a3b8;--a:#a855f7;--sep:rgba(168,85,247,.2)}
@media(prefers-color-scheme:light){:root{--bg0:#fafafa;--bg1:#f0ebff;--t:#1a1a2e;--ts:#64748b;--sep:rgba(168,85,247,.3)}}
*{margin:0;padding:0;box-sizing:border-box}
.w{width:900px;height:300px;background:linear-gradient(150deg,var(--bg0),var(--bg1));display:flex;align-items:center;padding:48px 56px;border-radius:16px;overflow:hidden;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:var(--t);gap:52px}
.left{flex-shrink:0;width:230px}
.h2{font-size:32px;font-weight:800;line-height:1.2;margin-bottom:16px;color:var(--t)}
.line{width:44px;height:4px;background:linear-gradient(90deg,#a855f7,#ec4899);border-radius:2px}
.sep{width:1px;background:var(--sep);align-self:stretch;flex-shrink:0}
.right{flex:1}
.desc{font-size:15px;color:var(--ts);line-height:1.8}
.hl{color:#a855f7;font-weight:600}
.code{font-family:'Cascadia Code','Consolas',monospace;background:rgba(168,85,247,.12);color:#c084fc;padding:1px 6px;border-radius:4px;font-size:13.5px}
</style>
<div class="w">
  <div class="left">
    <div class="h2">What is<br>AuraKit?</div>
    <div class="line"></div>
  </div>
  <div class="sep"></div>
  <div class="right">
    <p class="desc">AuraKit is a <span class="hl">Claude Code skill</span> that transforms a single <span class="code">/aura</span> command into a production-grade full-stack development pipeline.<br><br>Instead of giving Claude Code 20 separate instructions every time you start a project, AuraKit pre-loads all the best practices — security checks, code quality rules, token optimization, and smart context management — so Claude just <em>knows</em> what to do.</p>
  </div>
</div>
</div>
</foreignObject>
</svg>
