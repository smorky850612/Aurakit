<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
<foreignObject width="900" height="400">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
:root{--bg0:#0a0a0f;--bg1:#12121f;--t:#fff;--ts:#94a3b8;--a:#a855f7}
@media(prefers-color-scheme:light){:root{--bg0:#fafafa;--bg1:#f0ebff;--t:#1a1a2e;--ts:#64748b}}
*{margin:0;padding:0;box-sizing:border-box}
.w{width:900px;height:400px;background:linear-gradient(150deg,var(--bg0),var(--bg1));padding:40px 48px;border-radius:16px;overflow:hidden;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:var(--t)}
.h2{font-size:26px;font-weight:800;margin-bottom:28px;display:flex;align-items:center;gap:10px}
.h2::before{content:'🛡️';font-size:22px}
.layers{position:relative;display:flex;flex-direction:column;gap:12px;padding-left:28px}
.vline{position:absolute;left:9px;top:16px;bottom:16px;width:2px;background:linear-gradient(180deg,#a855f7,#ec4899);border-radius:1px;opacity:.5}
.layer{border-radius:10px;padding:16px 20px;position:relative;border:1px solid}
.l1{background:rgba(168,85,247,.07);border-color:rgba(168,85,247,.2)}
.l2{background:rgba(168,85,247,.13);border-color:rgba(168,85,247,.3)}
.l3{background:rgba(168,85,247,.19);border-color:rgba(168,85,247,.4)}
.l4{background:rgba(168,85,247,.26);border-color:rgba(168,85,247,.55)}
.dot{position:absolute;left:-24px;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;background:#a855f7;border:2px solid var(--bg0);box-shadow:0 0 8px rgba(168,85,247,.6)}
.lbl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#a855f7;margin-bottom:4px}
.ltitle{font-size:15px;font-weight:700;color:var(--t);margin-bottom:3px}
.ldesc{font-size:13px;color:var(--ts)}
.tag{display:inline-block;font-size:10.5px;background:rgba(168,85,247,.15);color:#c084fc;border-radius:5px;padding:1px 7px;margin-left:8px;vertical-align:middle;font-weight:600}
</style>
<div class="w">
  <div class="h2">4-Layer Security System</div>
  <div class="layers">
    <div class="vline"></div>
    <div class="layer l1">
      <div class="dot"></div>
      <div class="lbl">L1 — Session Start</div>
      <div class="ltitle">Skill Rules<span class="tag">0 tokens</span></div>
      <div class="ldesc">No eval(), no env exposure, parameterized SQL enforced at the instruction level</div>
    </div>
    <div class="layer l2">
      <div class="dot"></div>
      <div class="lbl">L2 — Every File Write</div>
      <div class="ltitle">Security Hook<span class="tag">bash · 0 tokens</span></div>
      <div class="ldesc">Secret patterns, API keys, hardcoded credentials — blocked before disk write</div>
    </div>
    <div class="layer l3">
      <div class="dot"></div>
      <div class="lbl">L3 — Post Implementation</div>
      <div class="ltitle">Worker Agent Review<span class="tag">context:fork</span></div>
      <div class="ldesc">OWASP Top 10, XSS/CSRF, rate limiting, input validation — full code scan</div>
    </div>
    <div class="layer l4">
      <div class="dot"></div>
      <div class="lbl">L4 — Pre Commit</div>
      <div class="ltitle">Migration Guard<span class="tag">bash · 0 tokens</span></div>
      <div class="ldesc">Destructive DB operations (DROP TABLE, TRUNCATE) blocked before any commit</div>
    </div>
  </div>
</div>
</div>
</foreignObject>
</svg>
