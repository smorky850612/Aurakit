<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
<foreignObject width="900" height="500">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
:root{--bg0:#0a0a0f;--bg1:#12121f;--t:#fff;--ts:#94a3b8;--a:#a855f7;--bd:rgba(168,85,247,.2)}
@media(prefers-color-scheme:light){:root{--bg0:#fafafa;--bg1:#f0ebff;--t:#1a1a2e;--ts:#64748b;--bd:rgba(168,85,247,.3)}}
*{margin:0;padding:0;box-sizing:border-box}
.w{width:900px;height:500px;background:linear-gradient(150deg,var(--bg0),var(--bg1));padding:36px 48px;border-radius:16px;overflow:hidden;font-family:'Cascadia Code','Consolas',monospace;color:var(--t)}
.h2{font-size:22px;font-weight:800;margin-bottom:20px;font-family:system-ui,-apple-system,'Segoe UI',sans-serif}
.tree{display:grid;grid-template-columns:1fr 1fr;gap:0 48px;font-size:13px;line-height:1.8}
.col-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--a);margin-bottom:10px;font-family:system-ui}
.dir{color:#c084fc;font-weight:600}
.file{color:var(--ts)}
.file.key{color:#e2e8f0}
.comment{color:#4b5563;font-size:11.5px}
.indent1{padding-left:16px}
.indent2{padding-left:32px}
.indent3{padding-left:48px}
.tree-box{background:rgba(255,255,255,.03);border:1px solid var(--bd);border-radius:10px;padding:16px 20px}
</style>
<div class="w">
  <div class="h2">Project Architecture</div>
  <div class="tree">
    <div>
      <div class="col-title">Skills &amp; Agents</div>
      <div class="tree-box">
        <div class="dir">aurakit/</div>
        <div class="indent1 dir">├── skills/</div>
        <div class="indent2 dir">│   ├── aura/</div>
        <div class="indent3 file key">│   │   ├── SKILL.md <span class="comment"># core (&lt;400 ln)</span></div>
        <div class="indent3 dir">│   │   └── resources/</div>
        <div class="indent3 file">│   │       ├── build-pipeline.md</div>
        <div class="indent3 file">│   │       ├── fix-pipeline.md</div>
        <div class="indent3 file">│   │       ├── clean-pipeline.md</div>
        <div class="indent3 file">│   │       ├── deploy-pipeline.md</div>
        <div class="indent3 file">│   │       ├── review-pipeline.md</div>
        <div class="indent3 file">│   │       └── security-rules.md</div>
        <div class="indent2 dir">│   ├── aura-compact/</div>
        <div class="indent3 file">│   │   └── SKILL.md</div>
        <div class="indent2 dir">│   └── aura-guard/</div>
        <div class="indent3 file">│       └── SKILL.md</div>
        <div class="indent1 dir">├── agents/</div>
        <div class="indent2 file key">│   ├── scout.md <span class="comment"># Haiku model</span></div>
        <div class="indent2 file key">│   └── worker.md <span class="comment"># Sonnet model</span></div>
      </div>
    </div>
    <div>
      <div class="col-title">Hooks &amp; Templates</div>
      <div class="tree-box">
        <div class="indent1 dir">├── hooks/ <span class="comment"># 8 bash scripts (0 tokens)</span></div>
        <div class="indent2 file key">│   ├── pre-session.sh</div>
        <div class="indent2 file key">│   ├── security-scan.sh</div>
        <div class="indent2 file key">│   ├── build-verify.sh</div>
        <div class="indent2 file">│   ├── bloat-check.sh</div>
        <div class="indent2 file key">│   ├── migration-guard.sh</div>
        <div class="indent2 file">│   ├── output-filter.sh</div>
        <div class="indent2 file key">│   ├── pre-compact-snapshot.sh</div>
        <div class="indent2 file key">│   └── post-compact-restore.sh</div>
        <div class="indent1 dir">├── templates/</div>
        <div class="indent2 file">│   ├── design-system-default.md</div>
        <div class="indent2 file">│   ├── project-profile-template.md</div>
        <div class="indent2 file">│   └── snapshot-template.md</div>
        <div class="indent1 dir">├── scripts/</div>
        <div class="indent2 file key">│   └── init.sh <span class="comment"># installer</span></div>
        <div class="indent1 file">├── README.md</div>
        <div class="indent1 file">└── LICENSE <span class="comment"># MIT</span></div>
      </div>
    </div>
  </div>
</div>
</div>
</foreignObject>
</svg>
