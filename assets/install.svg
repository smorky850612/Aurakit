<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="900" height="250">
<foreignObject width="900" height="250">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
:root{--bg0:#0a0a0f;--bg1:#12121f;--term:#07070f;--t:#fff;--ts:#94a3b8;--tb:rgba(168,85,247,.3)}
@media(prefers-color-scheme:light){:root{--bg0:#fafafa;--bg1:#f0ebff;--term:#1a1040;--t:#1a1a2e;--ts:#64748b;--tb:rgba(168,85,247,.4)}}
*{margin:0;padding:0;box-sizing:border-box}
.w{width:900px;height:250px;background:linear-gradient(150deg,var(--bg0),var(--bg1));padding:30px 48px;border-radius:16px;overflow:hidden;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:var(--t);display:flex;flex-direction:column;gap:16px;align-items:center}
.h2{font-size:22px;font-weight:800}
.terms{display:flex;gap:20px;width:100%}
.mac{flex:1;border-radius:10px;overflow:hidden;border:1px solid var(--tb);background:var(--term);box-shadow:0 0 30px rgba(168,85,247,.1)}
.mac-bar{background:rgba(255,255,255,.05);padding:8px 14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(168,85,247,.12)}
.d{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.dr{background:#ff5f57}.dy{background:#ffbd2e}.dg{background:#28ca41}
.mac-title{flex:1;text-align:center;font-size:10.5px;color:#3f4a66;font-family:'Cascadia Code','Consolas',monospace}
.mac-body{padding:10px 16px;font-family:'Cascadia Code','Consolas',monospace;font-size:13px;color:#e2e8f0;display:flex;flex-direction:column;gap:4px}
.ps{color:#22c55e;font-weight:700;margin-right:6px}
.cmd{color:#e2e8f0}
.out{color:#6b7280;font-size:12px}
.hint{font-size:12px;color:var(--ts);text-align:center}
.hint span{color:#a855f7;font-weight:600}
</style>
<div class="w">
  <div class="h2">Get Started in 3 Steps</div>
  <div class="terms">
    <div class="mac">
      <div class="mac-bar">
        <span class="d dr"></span><span class="d dy"></span><span class="d dg"></span>
        <span class="mac-title">Step 1 &amp; 2 — Install</span>
      </div>
      <div class="mac-body">
        <div><span class="ps">$</span><span class="cmd">git clone https://github.com/smorky850612/Aurakit.git</span></div>
        <div><span class="ps">$</span><span class="cmd">cd Aurakit &amp;&amp; bash scripts/init.sh</span></div>
        <div class="out">✓ Skills installed</div>
        <div class="out">✓ Hooks merged into settings.json</div>
      </div>
    </div>
    <div class="mac">
      <div class="mac-bar">
        <span class="d dr"></span><span class="d dy"></span><span class="d dg"></span>
        <span class="mac-title">Step 3 — Use it</span>
      </div>
      <div class="mac-body">
        <div><span class="ps">$</span><span class="cmd">cd ~/my-project</span></div>
        <div><span class="ps">$</span><span class="cmd">/aura 로그인 기능 만들어줘</span></div>
        <div class="out">▶ Mode: BUILD detected</div>
        <div class="out">▶ Scout scanning project...</div>
      </div>
    </div>
  </div>
  <div class="hint">No config required · <span>Works in any project directory</span> · Existing hooks preserved</div>
</div>
</div>
</foreignObject>
</svg>
