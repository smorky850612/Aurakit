<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
<foreignObject width="900" height="400">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
:root{--bg0:#0a0a0f;--bg1:#12121f;--t:#fff;--ts:#94a3b8;--a:#a855f7;--a2:#ec4899;--term:#07070f;--term-border:rgba(168,85,247,.4)}
@media(prefers-color-scheme:light){:root{--bg0:#fafafa;--bg1:#f0ebff;--t:#1a1a2e;--ts:#64748b;--term:#1a1040;--term-border:rgba(168,85,247,.5)}}
*{margin:0;padding:0;box-sizing:border-box}
.w{width:900px;height:400px;background:linear-gradient(150deg,var(--bg0) 0%,var(--bg1) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;position:relative;border-radius:16px;overflow:hidden;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:var(--t)}
.glow{position:absolute;width:700px;height:320px;top:-60px;left:50%;transform:translateX(-50%);background:radial-gradient(ellipse at 50% 30%,rgba(168,85,247,.18) 0%,rgba(236,72,153,.06) 50%,transparent 70%);pointer-events:none;animation:glowp 5s ease-in-out infinite}
.badge{background:rgba(168,85,247,.15);color:#a855f7;border:1px solid rgba(168,85,247,.35);padding:5px 16px;border-radius:100px;font-size:11.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.badge::before{content:'✦';font-size:10px}
.title{font-size:74px;font-weight:900;letter-spacing:-3px;color:var(--t);line-height:1}
.sub{font-size:19px;color:var(--ts);letter-spacing:.01em}
.term{width:600px;border-radius:10px;overflow:hidden;border:1px solid var(--term-border);background:var(--term);box-shadow:0 0 40px rgba(168,85,247,.12)}
.tbar{background:rgba(255,255,255,.05);padding:9px 15px;display:flex;align-items:center;gap:7px;border-bottom:1px solid rgba(168,85,247,.15)}
.d{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.dr{background:#ff5f57}.dy{background:#ffbd2e}.dg{background:#28ca41}
.ttl{flex:1;text-align:center;font-size:11.5px;color:#3f4a66;font-family:'Cascadia Code','Consolas',monospace}
.tbody{padding:13px 18px;font-family:'Cascadia Code','Consolas',monospace;font-size:14.5px;display:flex;gap:9px;align-items:center;color:#e2e8f0}
.ps{color:#22c55e;font-weight:700;flex-shrink:0}
.cmd{color:#e2e8f0}
.cur{color:#a855f7;animation:blink 1s step-end infinite}
.arr{font-size:22px;color:#a855f7;animation:bounce 1.8s ease-in-out infinite;margin-top:2px;line-height:1}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(9px)}}
@keyframes glowp{0%,100%{opacity:1}50%{opacity:1.3;transform:translateX(-50%) scale(1.04)}}
@media(prefers-reduced-motion:reduce){.cur,.arr,.glow{animation:none!important}}
</style>
<div class="w">
  <div class="glow"></div>
  <span class="badge">Claude Code Skill</span>
  <div class="title">AuraKit</div>
  <div class="sub">One command. Full stack. Zero compromise.</div>
  <div class="term">
    <div class="tbar">
      <span class="d dr"></span><span class="d dy"></span><span class="d dg"></span>
      <span class="ttl">bash — ~/my-project — 80×24</span>
    </div>
    <div class="tbody">
      <span class="ps">$</span>
      <span class="cmd">/aura 로그인 기능 만들어줘</span><span class="cur">█</span>
    </div>
  </div>
  <div class="arr">↓</div>
</div>
</div>
</foreignObject>
</svg>
