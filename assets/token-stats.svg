<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="900" height="250">
<foreignObject width="900" height="250">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
:root{--bg0:#0a0a0f;--bg1:#12121f;--t:#fff;--ts:#94a3b8}
@media(prefers-color-scheme:light){:root{--bg0:#fafafa;--bg1:#f0ebff;--t:#1a1a2e;--ts:#64748b}}
*{margin:0;padding:0;box-sizing:border-box}
.w{width:900px;height:250px;background:linear-gradient(150deg,var(--bg0),var(--bg1));padding:32px 48px;border-radius:16px;overflow:hidden;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:var(--t)}
.h2{font-size:20px;font-weight:800;margin-bottom:6px}
.sub{font-size:12.5px;color:var(--ts);margin-bottom:22px}
.chart{display:flex;flex-direction:column;gap:10px}
.row{display:flex;align-items:center;gap:12px}
.label{width:200px;font-size:13px;flex-shrink:0;text-align:right}
.label strong{color:var(--t);font-weight:700}
.label span{color:var(--ts);font-size:12px}
.bar-track{flex:1;height:28px;background:rgba(255,255,255,.05);border-radius:6px;overflow:hidden;position:relative}
.bar{height:100%;border-radius:6px;width:0;animation:grow 1s cubic-bezier(.4,0,.2,1) var(--d,0s) forwards;display:flex;align-items:center;padding:0 10px}
.b-aura{background:linear-gradient(90deg,#6366f1,#a855f7);--w:9.2%}
.b-manual{background:linear-gradient(90deg,#ef4444,#f97316);--w:50%}
.b-other{background:linear-gradient(90deg,#78716c,#a8a29e);--w:65%}
@keyframes grow{to{width:var(--w)}}
.val{font-size:11.5px;font-weight:700;color:#fff;white-space:nowrap}
.note{font-size:11px;color:var(--ts);margin-left:8px;flex-shrink:0}
.highlight{color:#a855f7;font-weight:700}
</style>
<div class="w">
  <div class="h2">Token Usage Comparison</div>
  <div class="sub">Typical BUILD job · fewer tokens = faster, cheaper, more context preserved</div>
  <div class="chart">
    <div class="row">
      <div class="label"><strong>AuraKit</strong> <span>(this skill)</span></div>
      <div class="bar-track">
        <div class="bar b-aura" style="--d:.1s"><span class="val">~4,600</span></div>
      </div>
      <div class="note highlight">✦ 91% fewer tokens</div>
    </div>
    <div class="row">
      <div class="label"><strong>Manual prompting</strong></div>
      <div class="bar-track">
        <div class="bar b-manual" style="--d:.3s"><span class="val">~25,000</span></div>
      </div>
      <div class="note">baseline</div>
    </div>
    <div class="row">
      <div class="label"><strong>Other skills</strong></div>
      <div class="bar-track">
        <div class="bar b-other" style="--d:.5s"><span class="val">~15,000–50,000</span></div>
      </div>
      <div class="note">varies widely</div>
    </div>
  </div>
</div>
</div>
</foreignObject>
</svg>
