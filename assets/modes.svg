<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
<foreignObject width="900" height="500">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
:root{--bg0:#0a0a0f;--bg1:#12121f;--card:#141428;--t:#fff;--ts:#94a3b8;--bd:rgba(168,85,247,.25)}
@media(prefers-color-scheme:light){:root{--bg0:#fafafa;--bg1:#f0ebff;--card:#f5f0ff;--t:#1a1a2e;--ts:#64748b;--bd:rgba(168,85,247,.3)}}
*{margin:0;padding:0;box-sizing:border-box}
.w{width:900px;height:500px;background:linear-gradient(150deg,var(--bg0),var(--bg1));padding:44px 48px;border-radius:16px;overflow:hidden;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:var(--t)}
.hd{text-align:center;margin-bottom:28px}
.h2{font-size:28px;font-weight:800;color:var(--t);margin-bottom:6px}
.sub{font-size:14.5px;color:var(--ts)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:22px 20px;display:flex;flex-direction:column;gap:10px;box-shadow:0 4px 24px rgba(0,0,0,.3),0 0 0 0 rgba(168,85,247,0);transition:box-shadow .2s}
.top{display:flex;align-items:center;gap:10px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tag{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:6px}
.name{font-size:15px;font-weight:700;color:var(--t)}
.desc{font-size:13px;color:var(--ts);line-height:1.5}
.ex{font-family:'Cascadia Code','Consolas',monospace;font-size:11.5px;color:#6b7280;margin-top:4px}
/* BUILD */
.c1 .dot{background:#a855f7}.c1 .tag{background:rgba(168,85,247,.15);color:#a855f7}.c1{box-shadow:0 4px 24px rgba(0,0,0,.3),inset 0 1px 0 rgba(168,85,247,.15)}
/* FIX */
.c2 .dot{background:#ec4899}.c2 .tag{background:rgba(236,72,153,.15);color:#ec4899}.c2{box-shadow:0 4px 24px rgba(0,0,0,.3),inset 0 1px 0 rgba(236,72,153,.15)}
/* CLEAN */
.c3 .dot{background:#06b6d4}.c3 .tag{background:rgba(6,182,212,.15);color:#06b6d4}.c3{box-shadow:0 4px 24px rgba(0,0,0,.3),inset 0 1px 0 rgba(6,182,212,.15)}
/* DEPLOY */
.c4 .dot{background:#22c55e}.c4 .tag{background:rgba(34,197,94,.15);color:#22c55e}.c4{box-shadow:0 4px 24px rgba(0,0,0,.3),inset 0 1px 0 rgba(34,197,94,.15)}
/* REVIEW */
.c5 .dot{background:#eab308}.c5 .tag{background:rgba(234,179,8,.15);color:#eab308}.c5{box-shadow:0 4px 24px rgba(0,0,0,.3),inset 0 1px 0 rgba(234,179,8,.15)}
/* COMPACT */
.c6 .dot{background:#6b7280}.c6 .tag{background:rgba(107,114,128,.15);color:#9ca3af}.c6{box-shadow:0 4px 24px rgba(0,0,0,.3),inset 0 1px 0 rgba(107,114,128,.15)}
</style>
<div class="w">
  <div class="hd">
    <div class="h2">6 Intelligent Modes</div>
    <div class="sub">Auto-detects what you need based on your natural language prompt</div>
  </div>
  <div class="grid">
    <div class="card c1">
      <div class="top"><span class="dot"></span><span class="tag">BUILD</span></div>
      <div class="name">Full-stack generation</div>
      <div class="desc">Micro-plan → file-by-file implementation → triple verification → commit</div>
      <div class="ex">/aura 로그인 기능 만들어줘</div>
    </div>
    <div class="card c2">
      <div class="top"><span class="dot"></span><span class="tag">FIX</span></div>
      <div class="name">Root cause analysis</div>
      <div class="desc">Error trace → Scout scan → minimal targeted fix → re-verify</div>
      <div class="ex">/aura TypeError 수정해줘</div>
    </div>
    <div class="card c3">
      <div class="top"><span class="dot"></span><span class="tag">CLEAN</span></div>
      <div class="name">Dead code removal</div>
      <div class="desc">Bloat detection → unused import/code removal → file split → verify</div>
      <div class="ex">/aura 코드 정리해줘</div>
    </div>
    <div class="card c4">
      <div class="top"><span class="dot"></span><span class="tag">DEPLOY</span></div>
      <div class="name">Build &amp; deploy config</div>
      <div class="desc">Framework detection → config generation → deployment checklist</div>
      <div class="ex">/aura vercel 배포 설정해줘</div>
    </div>
    <div class="card c5">
      <div class="top"><span class="dot"></span><span class="tag">REVIEW</span></div>
      <div class="name">Security audit</div>
      <div class="desc">3 Worker agents in parallel → VULN-001 report → A–F quality score</div>
      <div class="ex">/aura 코드 리뷰해줘</div>
    </div>
    <div class="card c6">
      <div class="top"><span class="dot"></span><span class="tag">COMPACT</span></div>
      <div class="name">Context compression</div>
      <div class="desc">Auto-snapshot at 65% → compress → restore state into new context</div>
      <div class="ex">/aura-compact</div>
    </div>
  </div>
</div>
</div>
</foreignObject>
</svg>
