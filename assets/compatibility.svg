<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
<foreignObject width="900" height="400">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
:root{--bg0:#0a0a0f;--bg1:#12121f;--card:#141428;--t:#fff;--ts:#94a3b8;--bd:rgba(168,85,247,.2)}
@media(prefers-color-scheme:light){:root{--bg0:#fafafa;--bg1:#f0ebff;--card:#f5f0ff;--t:#1a1a2e;--ts:#64748b;--bd:rgba(168,85,247,.3)}}
*{margin:0;padding:0;box-sizing:border-box}
.w{width:900px;height:400px;background:linear-gradient(150deg,var(--bg0),var(--bg1));padding:32px 48px;border-radius:16px;overflow:hidden;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:var(--t)}
.h2{font-size:22px;font-weight:800;margin-bottom:6px}
.sub{font-size:13px;color:var(--ts);margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.cell{background:var(--card);border:1px solid var(--bd);border-radius:9px;padding:12px 14px;display:flex;flex-direction:column;gap:6px}
.tool{font-size:13px;font-weight:700;color:var(--t)}
.badges{display:flex;gap:5px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.04em}
.full{background:rgba(168,85,247,.2);color:#c084fc;border:1px solid rgba(168,85,247,.35)}
.partial{background:rgba(100,116,139,.15);color:#94a3b8;border:1px solid rgba(100,116,139,.3)}
.hook-badge{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.no-badge{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.25)}
</style>
<div class="w">
  <div class="h2">Compatibility</div>
  <div class="sub">SKILL.md core instructions work everywhere · Full support requires hooks + agents</div>
  <div class="grid">
    <div class="cell">
      <div class="tool">Claude Code (Terminal)</div>
      <div class="badges">
        <span class="badge full">Full</span>
        <span class="badge hook-badge">Hooks ✓</span>
        <span class="badge hook-badge">Agents ✓</span>
      </div>
    </div>
    <div class="cell">
      <div class="tool">Claude Code (Web)</div>
      <div class="badges">
        <span class="badge partial">Partial</span>
        <span class="badge no-badge">No Hooks</span>
      </div>
    </div>
    <div class="cell">
      <div class="tool">Cursor</div>
      <div class="badges">
        <span class="badge partial">Partial</span>
        <span class="badge no-badge">No Hooks</span>
      </div>
    </div>
    <div class="cell">
      <div class="tool">GitHub Copilot</div>
      <div class="badges">
        <span class="badge partial">Partial</span>
        <span class="badge no-badge">No Hooks</span>
      </div>
    </div>
    <div class="cell">
      <div class="tool">Windsurf</div>
      <div class="badges">
        <span class="badge partial">Partial</span>
        <span class="badge no-badge">No Hooks</span>
      </div>
    </div>
    <div class="cell">
      <div class="tool">Gemini CLI</div>
      <div class="badges">
        <span class="badge partial">Partial</span>
        <span class="badge no-badge">No Hooks</span>
      </div>
    </div>
    <div class="cell">
      <div class="tool">Codex (OpenAI)</div>
      <div class="badges">
        <span class="badge partial">Partial</span>
        <span class="badge no-badge">No Hooks</span>
      </div>
    </div>
    <div class="cell">
      <div class="tool">Goose</div>
      <div class="badges">
        <span class="badge partial">Partial</span>
        <span class="badge no-badge">No Hooks</span>
      </div>
    </div>
    <div class="cell">
      <div class="tool">Amp</div>
      <div class="badges">
        <span class="badge partial">Partial</span>
        <span class="badge no-badge">No Hooks</span>
      </div>
    </div>
    <div class="cell">
      <div class="tool">Roo Code</div>
      <div class="badges">
        <span class="badge partial">Partial</span>
        <span class="badge no-badge">No Hooks</span>
      </div>
    </div>
    <div class="cell">
      <div class="tool">OpenCode</div>
      <div class="badges">
        <span class="badge partial">Partial</span>
        <span class="badge no-badge">No Hooks</span>
      </div>
    </div>
    <div class="cell">
      <div class="tool">Antigravity</div>
      <div class="badges">
        <span class="badge partial">Partial</span>
        <span class="badge no-badge">No Hooks</span>
      </div>
    </div>
  </div>
</div>
</div>
</foreignObject>
</svg>
