name: Wiki Init

# Creates the GitHub Wiki's first page (required before wiki-sync.yml can push).
# Trigger manually from Actions tab → "Run workflow".
# Run ONCE only — subsequent wiki updates are handled by wiki-sync.yml.

on:
  workflow_dispatch:

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Initialize wiki with Home page
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/smorky850612/Aurakit.wiki.git wiki-remote 2>/dev/null || {
            mkdir wiki-remote
            cd wiki-remote
            git init
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/smorky850612/Aurakit.wiki.git
          }
          cd wiki-remote
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Copy wiki files from repo
          cp ../wiki/*.md . 2>/dev/null || true

          # Ensure Home.md exists (GitHub Wiki entry point)
          if [ ! -f "Home.md" ]; then
            cat > Home.md << 'EOF'
          # AuraKit Wiki

          > Full-stack Claude Code skill — 36 modes · 6-layer security · ~55% token savings

          ## Navigation

          - [Quick Start](Quick-Start)
          - [Modes Reference](Modes-Reference)
          - [Security Layers](Security-Layers)
          - [Hook Events](Hook-Events)
          - [Instinct Engine](Instinct-Engine)
          - [Benchmark Results](Benchmarks)
          - [Installation Guide](Installation)
          - [Configuration](Configuration)
          - [Cross-Harness](Cross-Harness)
          - [Troubleshooting](Troubleshooting)

          ## Install

          \`\`\`bash
          npx @smorky85/aurakit          # npm (all platforms)
          brew install smorky85/tap/aurakit  # macOS Homebrew
          curl -fsSL https://get.aurakit.dev | bash  # one-liner
          winget install smorky85.AuraKit    # Windows
          \`\`\`

          *Auto-generated by wiki-init.yml*
          EOF
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "Wiki already initialized."
          else
            git commit -m "docs(wiki): initialize wiki — Home page + navigation"
            git push origin HEAD:master --force-with-lease || git push origin HEAD:master
          fi
          echo "Wiki initialized successfully."
